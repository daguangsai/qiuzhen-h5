<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>求真之境 · 一束光的远行</title>
<style>
/* ============================================================
   求真之境 · V3 —— 单机叙事 × 交互数字艺术
   一束被你唤醒的光（求真之灵），陪你走过七处场景，
   被你亲手喂养、被算法黑化、又被你亲手解放。
   设计：东方水墨·玄光 / 场景化叙事 / 满屏景深 / 克制的震撼
   ============================================================ */
:root{
  --ink:#06090a; --ink2:#0a0f11;
  --paper:#ece2cf; --paper-dim:#b9b09b;
  --jade:#6fb6a3; --jade-lo:#3c6f63; --jade-hi:#a8dccb;
  --gold:#c4a368; --gold-hi:#e7d2a0;
  --crimson:#b0594e; --crimson-hi:#e08a7c;
  --dim:#6c7a76;
  --serif:"Songti SC","STSong","Noto Serif SC","Source Han Serif SC",serif;
  /* 字体层级：书法标题 / 楷体小标 / 宋体正文 / 黑体UI——四种声音，各司其职 */
  --brush:"STXingkai","华文行楷","Xingkai SC","STXinwei","华文新魏","KaiTi","楷体",var(--serif);
  --kai:"KaiTi","楷体","STKaiti","华文楷体","Kaiti SC",var(--serif);
  --sans:"PingFang SC","Microsoft YaHei","微软雅黑","Source Han Sans SC","Noto Sans SC","Segoe UI",sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
/* 防孤字：CJK 只在标点/空格处断行 + 平衡各行长度 */
#dlgText,.alias,h1.title,#doubtEvent,.brkhint,#tameVerdict,#rippleWord,#amendScroll,.tiny,#cocoonHint{
  word-break:keep-all;line-break:strict;text-wrap:balance;overflow-wrap:break-word;}
html,body{height:100%;overflow:hidden;background:#000;color:var(--paper);
  font-family:var(--serif);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;cursor:none;}
body{display:flex;align-items:center;justify-content:center;}
#stage{position:relative;width:100vw;height:100vh;background:var(--ink);overflow:hidden;}
button,input{font-family:var(--serif);}

/* ---------- 场景天幕（按 data-scene 切换基调，满屏） ---------- */
#world{position:absolute;inset:-6%;z-index:0;transition:filter 1.6s var(--ease), background 1.6s var(--ease);
  background:radial-gradient(80% 60% at 50% 8%, rgba(168,220,203,.06), transparent 64%),
             radial-gradient(140% 100% at 50% 130%, #0f1b1b 0%, var(--ink) 58%, transparent 100%),
             linear-gradient(#070d0e,#05090a);}
#atmos{position:absolute;inset:0;z-index:1;}
.moon{position:absolute;top:8%;left:50%;width:8vmin;aspect-ratio:1;border-radius:50%;z-index:1;
  background:radial-gradient(circle at 42% 38%, #f3efe2, #cfe3d6 52%, #7fae9f 100%);
  box-shadow:0 0 7vmin rgba(168,220,203,.4),0 0 16vmin rgba(168,220,203,.16);transition:opacity 1.6s var(--ease), background 1.6s;}

/* 远景剪影山（满屏景深，参与视差） */
.range{position:absolute;left:-10%;right:-10%;z-index:1;pointer-events:none;transition:opacity 1.4s var(--ease);}
.range.far{bottom:18%;height:34%;opacity:.5;
  background:linear-gradient(transparent 38%,#0c1a1a 39%,#091413 100%);
  clip-path:polygon(0 100%,0 64%,14% 42%,26% 58%,38% 34%,52% 56%,64% 30%,77% 54%,88% 40%,100% 56%,100% 100%);}
.range.mid{bottom:14%;height:28%;opacity:.72;
  background:linear-gradient(transparent 34%,#0b1716 35%,#070f0e 100%);
  clip-path:polygon(0 100%,0 70%,12% 52%,24% 64%,40% 40%,55% 60%,70% 38%,84% 58%,100% 44%,100% 100%);}
.range.near{bottom:10%;height:24%;opacity:.9;
  background:linear-gradient(transparent 30%,#0a1413 31%,#05090a 100%);
  clip-path:polygon(0 100%,0 72%,18% 50%,33% 70%,48% 44%,63% 68%,80% 46%,100% 66%,100% 100%);}
.floor{position:absolute;bottom:0;left:-6%;right:-6%;height:14%;z-index:1;
  background:linear-gradient(#0a1212,#05090a);box-shadow:0 -2px 9vmin #000 inset;transition:opacity 1.4s;}
/* 水面倒影（部分场景启用） */
#water{position:absolute;left:-6%;right:-6%;bottom:0;height:30%;z-index:1;opacity:0;pointer-events:none;transition:opacity 1.6s var(--ease);
  background:linear-gradient(transparent, rgba(60,111,99,.10) 30%, rgba(8,16,16,.7));mix-blend-mode:screen;}

/* 场景基调切换 —— 每一厅是一处“地方” */
#stage[data-scene="void"]   #world{filter:saturate(.7) brightness(.85);}
#stage[data-scene="fog"]    #world{background:radial-gradient(90% 70% at 50% 30%, rgba(120,150,140,.10), transparent 70%),radial-gradient(140% 100% at 50% 130%, #14201f 0%, var(--ink) 60%), linear-gradient(#0a1314,#06090a);}
#stage[data-scene="study"]  #world{background:radial-gradient(70% 60% at 50% 28%, rgba(196,163,104,.10), transparent 66%),radial-gradient(140% 100% at 50% 130%, #1a160f 0%, #0a0807 62%), linear-gradient(#100c08,#070504);filter:sepia(.12);}
#stage[data-scene="abyss"]  #world{background:radial-gradient(60% 50% at 50% 70%, rgba(176,89,78,.10), transparent 60%),radial-gradient(120% 100% at 50% -10%, #0c1414 0%, #05080a 60%), linear-gradient(#080a0e,#04060a);}
#stage[data-scene="cocoon"] #world{background:radial-gradient(60% 60% at 50% 45%, rgba(176,89,78,.16), transparent 64%),radial-gradient(140% 100% at 50% 120%, #1a110d 0%, #06080a 64%);filter:saturate(1.05);}
#stage[data-scene="altar"]  #world{background:radial-gradient(70% 60% at 50% 26%, rgba(168,220,203,.10), transparent 66%),radial-gradient(140% 100% at 50% 130%, #101c1b 0%, #06090a 60%);}
#stage[data-scene="river"]  #world{background:radial-gradient(90% 70% at 50% 24%, rgba(168,220,203,.12), transparent 70%),radial-gradient(140% 100% at 50% 130%, #0e1c1c 0%, #05090b 62%);}
#stage[data-scene="abyss"] .moon,#stage[data-scene="cocoon"] .moon{opacity:.18;}
#stage[data-scene="abyss"] #water,#stage[data-scene="river"] #water{opacity:1;}
#stage[data-scene="cocoon"] .range,#stage[data-scene="cocoon"] .floor{opacity:.25;}

/* 颗粒 / 暗角 / bloom */
#grain{position:absolute;inset:-50%;z-index:30;opacity:.04;pointer-events:none;
  background-image:radial-gradient(#fff 1px,transparent 1px);background-size:3px 3px;animation:grain .6s steps(2) infinite;}
@keyframes grain{to{transform:translate(4px,3px);}}
#vignette{position:absolute;inset:0;z-index:31;pointer-events:none;
  background:radial-gradient(130% 100% at 50% 44%,transparent 48%,rgba(0,0,0,.82) 100%);}
#bloom{position:absolute;inset:0;z-index:2;pointer-events:none;mix-blend-mode:screen;opacity:.5;
  background:radial-gradient(42% 32% at 50% 32%, rgba(168,220,203,.10), transparent 70%);transition:opacity 1.2s,background 1.4s;}

/* ---------- 流云薄雾（按场景涨落的纵深层，让每一厅更"长"） ---------- */
#mist{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 1.6s var(--ease);}
#mist i{position:absolute;left:-22%;right:-22%;height:20vh;border-radius:50%;filter:blur(44px);mix-blend-mode:screen;
  background:radial-gradient(ellipse 60% 100% at center, rgba(150,182,170,.12), transparent 72%);}
#mist .b1{top:28%;animation:mistA 46s ease-in-out infinite;}
#mist .b2{top:50%;height:24vh;animation:mistB 62s ease-in-out infinite;}
#mist .b3{top:66%;animation:mistA 54s ease-in-out infinite reverse;}
@keyframes mistA{0%,100%{transform:translateX(-6%);}50%{transform:translateX(7%);}}
@keyframes mistB{0%,100%{transform:translateX(6%) scaleY(1);}50%{transform:translateX(-7%) scaleY(1.12);}}
#stage[data-scene="void"]   #mist{opacity:.45;}
#stage[data-scene="fog"]    #mist{opacity:1;}
#stage[data-scene="abyss"]  #mist{opacity:.75;}
#stage[data-scene="study"]  #mist{opacity:.5;}
#stage[data-scene="altar"]  #mist{opacity:.55;}
#stage[data-scene="river"]  #mist{opacity:.7;}
/* 渊/茧染上反派霓虹的雾，河谷回到玉色 */
#stage[data-scene="abyss"] #mist i{background:radial-gradient(ellipse 60% 100% at center, rgba(176,89,78,.10), transparent 72%);}
#stage[data-scene="cocoon"] #mist{opacity:.6;}
#stage[data-scene="cocoon"] #mist i{background:radial-gradient(ellipse 60% 100% at center, rgba(255,60,168,.08), transparent 72%);}
#stage[data-scene="river"] #mist i,#stage[data-scene="altar"] #mist i{background:radial-gradient(ellipse 60% 100% at center, rgba(168,220,203,.13), transparent 72%);}

/* ---------- 补正台·书房陈设（深夜改稿的环境，落在卡片之后） ---------- */
#studyDress{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 1.4s var(--ease);}
#stage[data-scene="study"] #studyDress{opacity:1;}
.sd-cord{position:absolute;left:50%;top:0;width:2px;height:13vh;transform:translateX(-50%);
  background:linear-gradient(#2a2418,rgba(42,36,24,0));}
.sd-cone{position:absolute;left:50%;top:11vh;width:64vw;height:70vh;transform:translateX(-50%);mix-blend-mode:screen;
  background:radial-gradient(46% 60% at 50% 0%, rgba(231,210,160,.18), rgba(196,163,104,.06) 40%, transparent 72%);
  -webkit-clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);
  animation:sdFlicker 6s ease-in-out infinite;}
@keyframes sdFlicker{0%,100%{opacity:.9;}48%{opacity:1;}52%{opacity:.82;}}
.sd-bulb{position:absolute;left:50%;top:calc(11vh - 7px);width:16px;height:16px;transform:translateX(-50%);border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#fff,#e7d2a0 55%,#9a7c3e);box-shadow:0 0 26px rgba(231,210,160,.7);}
.sd-desk{position:absolute;left:0;right:0;bottom:0;height:16vh;
  background:linear-gradient(transparent,#100b06 56%,#0a0703);box-shadow:0 -1px 0 rgba(231,210,160,.08) inset;}
.sd-figure{position:absolute;right:7%;bottom:13vh;width:clamp(130px,18vmin,210px);opacity:.72;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.6)) drop-shadow(0 -1px 3px rgba(231,210,160,.25));
  animation:sdBreath 5.5s ease-in-out infinite;}
.sd-figure svg{display:block;width:100%;height:auto;}
@keyframes sdBreath{50%{transform:translateY(-.5vh);}}
@media (max-width:820px){.sd-figure{opacity:.35;right:2%;}}

/* ---------- 立名·墨环（序幕的提灯之芯，安静地转） ---------- */
.name-wrap{position:relative;}
#nameOrb{position:relative;z-index:1;}
.name-wrap::before{content:"";position:absolute;left:50%;top:0;width:min(34vmin,260px);aspect-ratio:1;
  transform:translate(-50%,-34%);border-radius:50%;pointer-events:none;
  background:radial-gradient(circle, rgba(168,220,203,.10), transparent 64%);
  box-shadow:0 0 0 1px rgba(168,220,203,.10) inset;animation:nameRing 22s linear infinite;}
@keyframes nameRing{to{transform:translate(-50%,-34%) rotate(360deg);}}

/* ---------- 星点（序/御器的高天，几粒会眨的星） ---------- */
#stars{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 1.6s var(--ease);}
#stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#dfeee8;
  box-shadow:0 0 6px rgba(168,220,203,.8);animation:twinkle 4s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:1;}}
#stage[data-scene="void"] #stars,#stage[data-scene="altar"] #stars,#stage[data-scene="river"] #stars{opacity:.9;}

/* ---------- 转场：墨晕光门 ---------- */
#wipe{position:absolute;inset:0;z-index:80;pointer-events:none;opacity:0;
  background:radial-gradient(closest-side, rgba(6,12,12,0) 0%, rgba(6,12,12,0) 30%, var(--ink) 62%);}
#wipe.in{animation:wipeIn 1.05s var(--ease) forwards;}
#wipe.out{animation:wipeOut 1.05s var(--ease) forwards;}
@keyframes wipeIn{0%{opacity:0;transform:scale(1.6);}40%{opacity:1;}100%{opacity:1;transform:scale(1);}}
@keyframes wipeOut{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(.6);}}

/* ---------- 光标·提灯（玩家的“在场”） ---------- */
#cursor{position:fixed;z-index:150;left:50vw;top:50vh;width:22px;height:22px;border-radius:50%;pointer-events:none;
  transform:translate(-50%,-50%);background:radial-gradient(circle,#fff 20%,rgba(168,220,203,.72) 54%,transparent 74%);
  box-shadow:0 0 24px rgba(168,220,203,.95),0 0 7px #fff,0 0 0 1.5px rgba(168,220,203,.55);mix-blend-mode:screen;
  animation:cursorBreathe 2.4s ease-in-out infinite;transition:width .3s,height .3s;}
@keyframes cursorBreathe{50%{box-shadow:0 0 30px rgba(168,220,203,1),0 0 9px #fff,0 0 0 2.5px rgba(168,220,203,.4);}}
#lantern{position:fixed;z-index:3;left:0;top:0;width:46vmin;height:46vmin;border-radius:50%;pointer-events:none;
  transform:translate(-50%,-50%);mix-blend-mode:screen;opacity:0;transition:opacity 1s var(--ease);
  background:radial-gradient(circle, rgba(231,210,160,.22), rgba(168,220,203,.08) 36%, transparent 66%);}
#stage[data-scene="fog"] #lantern,#stage[data-scene="abyss"] #lantern{opacity:1;}
.cursor-hot #cursor{width:34px;height:34px;}

/* ---------- 顶/底 影院黑边（叙事时压暗） ---------- */
.cine{position:absolute;left:0;right:0;height:0;z-index:70;background:#000;pointer-events:none;transition:height .9s var(--ease);}
#cineTop{top:0;} #cineBot{bottom:0;}
#stage.cinematic .cine{height:8vh;}

/* ---------- 对白系统（单机叙事核心） ---------- */
/* 视觉小说式对白框（橙光感：底部框 + 名牌） */
#dialogue{position:absolute;left:50%;bottom:4.5vh;z-index:74;width:min(880px,92vw);
  text-align:left;opacity:0;pointer-events:none;transition:opacity .45s var(--ease),transform .45s var(--ease);
  transform:translateX(-50%) translateY(10px);
  background:linear-gradient(180deg,rgba(11,18,18,.88),rgba(6,11,12,.95));
  border:1px solid rgba(196,163,104,.32);border-radius:14px;padding:3vh 2.6vw 3.4vh;
  box-shadow:0 24px 70px -24px #000,inset 0 0 50px rgba(0,0,0,.45);backdrop-filter:blur(4px);}
#dialogue.show{opacity:1;transform:translateX(-50%) translateY(0);}
#dlgWho{position:absolute;left:1.6vw;top:-1.4em;display:inline-block;padding:.35em 1.3em;border-radius:9px;
  font-family:var(--kai);font-size:clamp(13px,1.3vw,17px);font-weight:700;letter-spacing:.22em;margin-right:-.22em;color:var(--gold-hi);
  background:linear-gradient(180deg,#1a2624,#0c1311);border:1px solid var(--gold);box-shadow:0 6px 20px -10px #000;}
#dlgWho:empty,#dlgWho.narr{display:none;}
#dlgWho.spirit{color:var(--jade-hi);border-color:var(--jade);}
#dlgWho.corrupt{color:var(--crimson-hi);border-color:var(--crimson);background:linear-gradient(180deg,#2a1513,#180c0c);}
#dlgWho.lin{color:#e6c089;border-color:#b98b4e;}
#dlgWho.man{color:#9cd0dd;border-color:#4f8a98;}
#dlgWho.yi{color:#e7a9b4;border-color:#b56676;}
#dlgWho.me{color:#e3dccb;border-color:#8a8472;}
/* 角色立绘（半身·无面·以设计区分） */
#dlgPortrait{position:absolute;left:1vw;bottom:calc(100% - 1.6vh);width:13vmin;max-width:118px;opacity:0;
  transform:translateY(12px) scale(.96);transition:opacity .45s var(--ease),transform .45s var(--ease);
  pointer-events:none;filter:drop-shadow(0 8px 18px rgba(0,0,0,.65));}
#dlgPortrait.on{opacity:1;transform:none;}
#dlgPortrait svg{display:block;width:100%;height:auto;}
#dlgText{font-size:clamp(16px,1.7vw,25px);line-height:1.95;color:#ece2cf;letter-spacing:.04em;text-align:left;min-height:2.4em;
  word-break:keep-all;line-break:strict;text-wrap:pretty;overflow-wrap:break-word;}
#dlgText .em{color:var(--jade-hi);} #dlgText .gold{color:var(--gold-hi);} #dlgText .warn{color:var(--crimson-hi);}
#dlgText .cur{display:inline-block;width:.5em;color:var(--jade-hi);animation:blink .8s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
#dlgNext{position:absolute;right:1.8vw;bottom:.8vh;font-size:12px;letter-spacing:.3em;color:var(--gold);opacity:0;transition:opacity .4s;}
#dlgNext.on{opacity:.7;animation:nudge 1.6s ease-in-out infinite;}
@keyframes nudge{50%{transform:translateY(4px);opacity:.4;}}
/* 对白底衬：保证字幕永远落在一条压暗的带子上，不与场景/人物文字“糊”在一起 */
#dlgBackdrop{position:absolute;left:0;right:0;bottom:0;height:30vh;z-index:72;pointer-events:none;opacity:0;
  transition:opacity .6s var(--ease);
  background:linear-gradient(transparent,rgba(4,7,8,.55) 42%,rgba(3,6,7,.92));}
#stage.cinematic #dlgBackdrop{opacity:1;}

/* ---------- 人影群（让网海“有人”，第一视角里你身处人群中） ---------- */
#crowd{position:absolute;inset:0;z-index:32;pointer-events:none;overflow:hidden;}
.fig{position:absolute;bottom:0;transform-origin:bottom center;opacity:0;
  transition:opacity 1.4s var(--ease),filter 1.2s;animation:sway 6s ease-in-out infinite;
  filter:drop-shadow(0 1px 2px #000) drop-shadow(0 0 1.6vmin rgba(140,195,178,.5));}
.fig svg{display:block;width:100%;height:auto;}
.fig.show{opacity:var(--o,.62);}
@keyframes sway{0%,100%{transform:rotate(-1.3deg) translateY(0);}50%{transform:rotate(1.3deg) translateY(-.4vh);}}

/* ---------- 持久同行者 · 求真之灵（有人物形象、无面，留神秘） ---------- */
#spirit{position:absolute;z-index:60;width:13vmin;left:50%;top:54%;transform:translate(-50%,-50%);
  pointer-events:none;transition:left 1.6s var(--ease),top 1.6s var(--ease),width 1.6s var(--ease),filter 1.2s var(--ease),opacity 1s;
  filter:drop-shadow(0 0 3vmin rgba(168,220,203,.5));}
#spirit.anxious{filter:drop-shadow(0 0 3vmin rgba(196,163,104,.6));}
#spirit.corrupt{filter:drop-shadow(0 0 4vmin rgba(176,89,78,.65));}
#spirit.bright{filter:drop-shadow(0 0 5vmin rgba(231,250,242,.85));}
#spirit .float{animation:bob 5.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.6vh);}}

/* ---------- HUD：进度导览 + 厅名 + 静音 ---------- */
#hallmark{position:absolute;left:3vw;top:50%;transform:translateY(-50%);z-index:66;
  writing-mode:vertical-rl;text-orientation:upright;letter-spacing:.5em;
  font-size:clamp(15px,1.6vw,22px);color:var(--gold);opacity:.6;display:flex;align-items:center;gap:1.1em;pointer-events:none;}
#hallmark .idx{writing-mode:horizontal-tb;font-size:.6em;color:var(--jade-hi);letter-spacing:.1em;opacity:.85;}
#guide{position:absolute;right:3vw;bottom:3.4vh;z-index:66;display:flex;align-items:center;gap:.9em;opacity:.8;}
#guide .dot{width:7px;height:7px;border-radius:50%;background:#2b3d39;transition:.5s var(--ease);}
#guide .dot.on{background:var(--gold-hi);box-shadow:0 0 12px rgba(231,210,160,.7);transform:scale(1.25);}
#guide .lbl{font-size:11px;letter-spacing:.24em;color:var(--gold);}
#sound{position:absolute;top:2.6vh;right:2.6vw;z-index:67;width:40px;height:40px;border-radius:50%;
  border:1px solid var(--gold);background:rgba(8,14,12,.6);color:var(--gold-hi);cursor:none;font-size:15px;transition:.4s var(--ease);}
#sound:hover{box-shadow:0 0 18px rgba(196,163,104,.4);} #sound.off{opacity:.4;}
#skip{position:absolute;top:2.6vh;left:2.6vw;z-index:67;font-size:11px;letter-spacing:.24em;color:var(--dim);
  background:none;border:none;cursor:none;opacity:.55;transition:.3s;}
#skip:hover{opacity:1;color:var(--gold-hi);}

/* ---------- 通用：场景内容面板（满屏布局，不再挤在中央窄列） ---------- */
.panel{position:absolute;inset:0;z-index:50;display:none;}
.panel.live{display:block;animation:fadeIn 1.1s var(--ease) both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;width:min(40em,86vw);}
.kicker{font-family:var(--sans);font-size:clamp(11px,1.1vw,14px);font-weight:300;letter-spacing:.5em;color:var(--jade);opacity:.85;margin-right:-.5em;}
h1.title{font-family:var(--brush);font-size:clamp(48px,8vw,140px);font-weight:500;letter-spacing:.16em;margin-right:-.16em;line-height:1.08;
  color:var(--paper);text-shadow:0 0 36px rgba(168,220,203,.2),0 2px 2px rgba(0,0,0,.5);}
.title .glow{color:var(--gold-hi);text-shadow:0 0 34px rgba(196,163,104,.6),0 0 12px rgba(231,210,160,.5);}
.hairline{width:min(360px,52%);height:1px;margin:3vh auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.tiny{font-family:var(--sans);font-size:clamp(10px,1vw,13px);font-weight:300;letter-spacing:.18em;color:var(--dim);line-height:1.9;}

/* 玉符按钮 */
.act{position:relative;margin-top:3.4vh;padding:1em 2.6em;cursor:none;
  font-size:clamp(14px,1.5vw,19px);font-weight:700;letter-spacing:.28em;margin-right:-.28em;
  color:var(--gold-hi);background:linear-gradient(180deg,rgba(18,32,30,.7),rgba(8,16,14,.7));
  border:1px solid var(--gold);border-radius:3px;transition:.45s var(--ease);overflow:hidden;}
.act::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(231,210,160,.18) 50%,transparent 70%);
  transform:translateX(-130%);transition:transform .8s var(--ease);}
.act:hover{color:#fff;border-color:var(--jade-hi);box-shadow:0 0 34px rgba(168,220,203,.34),inset 0 0 22px rgba(168,220,203,.08);}
.act:hover::before{transform:translateX(130%);}
.act.ghost{border-color:#33524d;color:var(--paper-dim);background:transparent;letter-spacing:.2em;padding:.7em 1.6em;font-size:13px;}
.act.ghost:hover{border-color:var(--jade);box-shadow:none;color:var(--jade-hi);}

/* ============ 开篇·手机（橙光式冷开场） ============ */
#phone{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) scale(.94);z-index:58;
  width:min(300px,74vw);height:min(600px,72vh);border-radius:38px;background:#04070a;border:2px solid #1d2a28;
  box-shadow:0 30px 90px -20px #000,0 0 70px rgba(168,220,203,.12),inset 0 0 0 5px #0a0f10;
  opacity:0;pointer-events:none;overflow:hidden;transition:opacity .8s var(--ease),transform .8s var(--ease),filter .8s;}
#phone.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#phone.leave{opacity:0;transform:translate(-50%,-50%) scale(1.35);filter:blur(8px);}
#phone .notch{position:absolute;left:50%;top:10px;transform:translateX(-50%);width:34%;height:20px;background:#04070a;border-radius:0 0 14px 14px;z-index:3;}
.pscreen{position:absolute;inset:9px;border-radius:30px;background:linear-gradient(#0b1416,#070d0e);overflow:hidden;display:flex;flex-direction:column;}
.pbar{display:flex;justify-content:space-between;align-items:center;padding:1.4em 1.4em .5em;font-size:11px;color:#7d938c;letter-spacing:.1em;}
.phead{padding:.6em 1em;font-size:14px;color:var(--paper);border-bottom:1px solid rgba(255,255,255,.06);text-align:center;letter-spacing:.14em;}
.phead small{display:block;font-size:.7em;color:#6c7a76;letter-spacing:.1em;margin-top:.2em;}
.pchat{flex:1;padding:1em .9em;display:flex;flex-direction:column;gap:.7em;overflow:hidden;}
.pmsg{max-width:82%;padding:.6em .8em;border-radius:12px;font-size:13px;line-height:1.65;background:#13201f;color:#c7d4cd;align-self:flex-start;
  border:1px solid rgba(255,255,255,.05);opacity:0;transform:translateY(10px);transition:.45s var(--ease);}
.pmsg.in{opacity:1;transform:none;}
.pmsg.me{align-self:flex-end;background:#1c3330;color:#dfeee8;}
.pmsg.rumor{max-width:92%;background:linear-gradient(180deg,#241413,#190f0e);border-color:rgba(176,89,78,.5);color:#e7cfc9;}
.pmsg .img{height:74px;border-radius:8px;margin-bottom:.5em;position:relative;
  background:repeating-linear-gradient(45deg,#2a1a18,#2a1a18 7px,#1f1413 7px,#1f1413 14px);}
.pmsg .img::after{content:'［ 截图·已模糊 ］';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#b39;letter-spacing:.1em;color:#a98;}
.pmsg .warn{color:var(--crimson-hi);font-weight:700;}
.pforward{display:flex;align-items:center;gap:.6em;padding:.7em .9em;border-top:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.35);}
.pmsg-mini{flex:1;font-size:12px;color:#8aa19a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pfwd{padding:.55em 1.2em;border-radius:9px;border:1px solid var(--crimson);background:rgba(176,89,78,.18);color:#e7cfc9;font-size:13px;letter-spacing:.12em;}
.pfwd.pulse{animation:fwdpulse 1.1s ease-in-out infinite;}
@keyframes fwdpulse{50%{box-shadow:0 0 22px rgba(176,89,78,.75);background:rgba(176,89,78,.42);}}
.pthumb{position:absolute;right:16%;bottom:5%;width:62px;height:62px;border-radius:50% 50% 50% 14px;z-index:4;
  background:radial-gradient(circle at 42% 36%,rgba(255,255,255,.22),rgba(180,160,150,.13) 58%,transparent 72%);
  border:1px solid rgba(255,255,255,.18);opacity:0;transition:.6s;}
#phone.thumbon .pthumb{opacity:1;animation:thumbbob 1.4s ease-in-out infinite;}
@keyframes thumbbob{50%{transform:translateY(-7px);}}
/* 假新闻文章卡（手机上清楚地“摆着”那条假消息） */
#phone .warn{color:var(--crimson-hi);}
.post{background:#0e1a19;border:1px solid rgba(176,89,78,.42);border-radius:12px;padding:.85em .85em;
  opacity:0;transform:translateY(12px);transition:.55s var(--ease);box-shadow:0 8px 24px -12px #000;}
.post.in{opacity:1;transform:none;}
.post-top{display:flex;align-items:center;gap:.6em;margin-bottom:.6em;}
.ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#b0594e,#5e332e);flex:none;}
.post-id b{font-size:12.5px;color:#d2ddd7;display:block;line-height:1.3;}
.post-id small{font-size:10px;color:#8aa19a;}
.post-img{height:94px;border-radius:8px;margin-bottom:.6em;position:relative;
  background:repeating-linear-gradient(45deg,#2a1a18,#2a1a18 8px,#1f1413 8px,#1f1413 16px);}
.post-img::after{content:'［ 配图·已模糊 ］';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#a98;letter-spacing:.12em;}
.post-title{font-size:14.5px;line-height:1.65;color:#ecd9d3;margin-bottom:.55em;font-weight:700;}
.post-meta{font-size:11px;color:#7a6f6a;letter-spacing:.03em;border-top:1px solid rgba(255,255,255,.05);padding-top:.5em;}
.debunk-tag{display:block;text-align:center;background:rgba(176,89,78,.22);border:1px solid var(--crimson);
  color:var(--crimson-hi);font-size:11px;letter-spacing:.08em;padding:.4em .6em;border-radius:7px;margin-bottom:.7em;}
.post.debunked{border-color:rgba(120,110,90,.4);}
.pmsg b{color:#8aa19a;font-size:.85em;display:block;margin-bottom:.2em;}

/* ============ 命名（清爽·剧情式） ============ */
@keyframes spin{to{transform:rotate(360deg);}}
#p-name.live{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6vh 6vw;}
.name-wrap{display:flex;flex-direction:column;align-items:center;gap:3vh;width:min(30em,90vw);text-align:center;}
#nameOrb{width:min(12vmin,96px);height:auto;filter:drop-shadow(0 0 2.4vmin rgba(168,220,203,.55));}
.name-q{font-size:clamp(18px,2vw,28px);color:var(--paper);letter-spacing:.1em;}
.alias{font-family:var(--brush);font-size:clamp(26px,3.4vw,46px);font-weight:500;letter-spacing:.16em;margin-right:-.16em;
  color:var(--gold-hi);text-shadow:0 0 24px rgba(196,163,104,.45);min-height:1.1em;transition:opacity .4s var(--ease);}
.aliasInput{background:transparent;border:none;border-bottom:1px solid rgba(196,163,104,.5);
  color:var(--gold-hi);font-size:clamp(18px,1.9vw,24px);text-align:center;padding:.4em .6em;width:min(300px,80%);
  letter-spacing:.18em;outline:none;transition:.4s var(--ease);cursor:auto;}
.aliasInput:focus{border-color:var(--jade-hi);box-shadow:0 8px 24px -16px rgba(168,220,203,.6);}
.aliasInput::placeholder{color:#566b66;letter-spacing:.1em;}
.aliasRow{display:flex;gap:1.4em;align-items:center;flex-wrap:wrap;justify-content:center;}

/* ============ 谣言之雾·赛博水墨（按剧情重搭）==================
   剧情：越吓人越没出处、被转上万次；有据可溯的反没人理。
   每条都是信息洪流里的"数据残片"，真假未明 → 统一冷调故障感，
   绝不靠颜色剧透。你的判断令其显形：
     涤散假讯 = 品红故障·数据消解
     留存真讯 = 故障收束·结晶成玉色水墨
   ============================================================ */
#fogfield{position:absolute;inset:0;z-index:52;}
/* 数据残片：冷调、微故障抖动，真假未明（不剧透） */
.frag{position:absolute;transform:translate(-50%,-50%);padding:.55em 1em;border-radius:3px;cursor:none;
  font-size:clamp(13px,1.4vw,18px);letter-spacing:.04em;color:#bcd2da;white-space:nowrap;
  background:rgba(10,18,24,.62);border:1px solid rgba(90,140,160,.5);backdrop-filter:blur(2px);
  box-shadow:0 6px 24px rgba(0,0,0,.4),inset 0 0 0 1px rgba(57,208,255,.06);
  animation:fragGlitch 5s steps(9) infinite;
  transition:transform .35s var(--ease),opacity .6s var(--ease),border-color .35s,color .35s,filter .6s,box-shadow .5s;}
@keyframes fragGlitch{0%,93%,100%{text-shadow:none;}94%{text-shadow:1px 0 #39d0ff,-1px 0 #ff3ca8;}97%{text-shadow:-1px 0 #39d0ff,1px 0 #ff3ca8;}}
.frag:hover{border-color:#7fdcff;color:#eaf6fb;transform:translate(-50%,-50%) scale(1.07);
  box-shadow:0 0 26px rgba(57,208,255,.3),inset 0 0 0 1px rgba(57,208,255,.2);}
/* 涤散假讯：品红故障 → 数据消解 */
.frag.fake{opacity:0;transform:translate(-50%,-50%) scale(.7) rotate(4deg);filter:blur(6px);
  border-color:#ff3ca8;color:#ff6ec0;text-shadow:3px 0 #39d0ff,-3px 0 #ff3ca8;box-shadow:0 0 30px rgba(255,60,168,.5);}
/* 留存真讯：故障收束 → 结晶成玉色水墨 */
.frag.real{border-color:var(--jade-hi);color:var(--jade-hi);box-shadow:0 0 26px rgba(168,220,203,.45);
  animation:none;text-shadow:0 0 10px rgba(168,220,203,.5);}
.frag .tag{display:block;font-size:.6em;letter-spacing:.16em;margin-top:.25em;opacity:.85;font-family:"Courier New",ui-monospace,monospace;}
.frag.real .tag{color:var(--jade-hi);} .frag.fake .tag{color:#ff6ec0;}
#fogHud{position:absolute;left:50%;bottom:20vh;transform:translateX(-50%);z-index:54;text-align:center;
  font-size:clamp(13px,1.4vw,18px);color:var(--paper-dim);letter-spacing:.1em;}
#fogcount{color:var(--jade-hi);font-weight:900;}

/* ============ 补正台·赛博水墨（按剧情重搭）======================
   剧情：小满为流量改了标题、添了情绪、删了出处。这条内容是被算法
   放大、被转发链篡改的"赃物"。赛博只附在【被篡改处】：
     情绪词 = 品红炽光（被添加的情绪）
     绝对断言 = 青色数据腐蚀（算法偏爱的极端）
     来源     = 被删字段（[已删除·不可溯]）
   你每补正一处，故障即解密成水墨；全句洁净 → 卡片落回宣纸。
   ================================================================ */
#amendStage{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(40em,92vw);text-align:center;}
#amendScroll{margin:0 auto;max-width:36em;border:1px solid rgba(57,208,255,.35);border-radius:12px;overflow:hidden;position:relative;
  background:linear-gradient(180deg,rgba(10,16,22,.92),rgba(8,12,16,.96));
  box-shadow:0 18px 55px -22px #000,0 0 30px rgba(57,208,255,.10);text-align:left;
  transition:border-color .7s var(--ease),box-shadow .7s var(--ease),background .9s var(--ease);}
/* 补正完成 → 赛博尽褪，落回水墨宣纸 */
#amendScroll.clean{border-color:rgba(196,163,104,.6);
  background:linear-gradient(180deg,rgba(22,20,15,.94),rgba(16,14,10,.96));
  box-shadow:0 0 50px rgba(196,163,104,.3);}
.news-head{display:flex;align-items:center;gap:.7em;padding:.85em 1.1em;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);}
.news-ava{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,#ff3ca8,#7a1d52);flex:none;box-shadow:0 0 14px rgba(255,60,168,.4);transition:.7s;}
#amendScroll.clean .news-ava{background:linear-gradient(135deg,#c4a368,#5e4a26);box-shadow:none;}
.news-head b{font-size:13.5px;color:#cfe6ee;display:block;line-height:1.3;}
.news-head small{font-size:11px;color:#7fa6b2;}
/* 算法热度：炽红跳动，洁净后降温 */
.news-heat{margin-left:auto;font-family:"Courier New",ui-monospace,monospace;font-size:12px;color:#ff7ac4;letter-spacing:.04em;
  white-space:nowrap;text-shadow:0 0 8px rgba(255,60,168,.6);animation:heatPulse 1.1s ease-in-out infinite;transition:.7s;}
@keyframes heatPulse{50%{opacity:.5;transform:scale(.95);}}
#amendScroll.clean .news-heat{color:#9db38f;text-shadow:none;animation:none;}
.news-title{padding:.9em 1.1em .3em;font-size:clamp(18px,2.1vw,28px);font-weight:900;line-height:1.55;color:#eaf3f6;transition:color .9s;}
.news-body{padding:.4em 1.1em 1em;font-size:clamp(15px,1.7vw,22px);line-height:2;color:#cfe0e6;transition:color .9s;}
#amendScroll.clean .news-title{color:#ecd9c8;}
#amendScroll.clean .news-body{color:#d8cfb8;}
.news-src{padding:.7em 1.1em;border-top:1px solid rgba(255,255,255,.06);font-size:13px;color:#7fa6b2;background:rgba(0,0,0,.25);font-family:"Courier New",ui-monospace,monospace;}

/* 情绪词 = 被添加的炽情：品红故障 */
.amend-emo{color:#ff6ec0;cursor:none;padding:0 .14em;border-radius:2px;
  background:rgba(255,60,168,.10);box-shadow:inset 0 0 0 1px rgba(255,60,168,.4);
  animation:emoGlitch 3.4s steps(7) infinite;transition:.3s var(--ease);}
.amend-emo::before{content:"＋";font-size:.62em;vertical-align:super;color:#ff3ca8;opacity:.85;margin-right:.05em;}
.amend-emo:hover{background:rgba(255,60,168,.22);text-shadow:1.4px 0 #39d0ff,-1.4px 0 #ff3ca8;}
@keyframes emoGlitch{0%,86%,100%{text-shadow:0 0 5px rgba(255,60,168,.5);}88%{text-shadow:1.4px 0 #39d0ff,-1.4px 0 #ff3ca8;}92%{text-shadow:-1.4px 0 #39d0ff,1.4px 0 #ff3ca8;}}
/* 删除：像被抹去的数据，碎散收拢 */
.amend-emo.dissolve{animation:emoDissolve .42s var(--ease) forwards;pointer-events:none;}
@keyframes emoDissolve{0%{filter:blur(0);}40%{text-shadow:3px 0 #39d0ff,-3px 0 #ff3ca8;opacity:.7;}100%{opacity:0;letter-spacing:-.5em;filter:blur(3px);}}
.amend-emo.gone{display:none;}

/* 绝对断言 = 算法偏爱的极端：青色数据腐蚀 */
.amend-abs{color:#7fdcff;cursor:none;padding:0 .14em;border-radius:2px;
  background:rgba(57,208,255,.10);box-shadow:inset 0 0 0 1px rgba(57,208,255,.4);
  animation:absGlitch 3s steps(6) infinite;transition:.3s var(--ease);}
.amend-abs:hover{background:rgba(57,208,255,.2);}
@keyframes absGlitch{0%,88%,100%{text-shadow:0 0 5px rgba(57,208,255,.5);}90%{text-shadow:1.2px 0 #ff3ca8,-1.2px 0 #39d0ff;}}
/* 软化：青色故障"解密"成玉色水墨 */
.amend-abs.fixed{color:var(--jade-hi);background:rgba(111,182,163,.12);
  box-shadow:inset 0 0 0 1px rgba(111,182,163,.45);cursor:default;animation:cyberDecrypt .6s var(--ease);}
@keyframes cyberDecrypt{0%{text-shadow:2px 0 #ff3ca8,-2px 0 #39d0ff;filter:brightness(1.6);}100%{text-shadow:0 0 8px rgba(168,220,203,.5);filter:none;}}

/* 来源 = 被删字段：补回即解密成水墨 */
.amend-src{color:#ff7a7a;font-family:"Courier New",ui-monospace,monospace;}
.amend-src.decoded{color:var(--jade-hi);animation:cyberDecrypt .6s var(--ease);}
#amendOps{display:flex;gap:1em;justify-content:center;margin-top:2vh;flex-wrap:wrap;}
#amendTip{margin-top:1.6vh;}

/* ============ 存疑之渊 ============ */
#doubtStage{position:absolute;inset:0;z-index:52;display:none;}
/* 存疑之渊·赛博水墨（按剧情重搭）：骂战=数据风暴，辱骂=飞来的刀；
   真相未明=信号腐蚀（品红），真相出来=信号澄清→玉色水墨 */
#doubtEvent{position:absolute;left:50%;top:14vh;transform:translateX(-50%);max-width:34em;width:86vw;text-align:center;
  padding:1em 1.4em;border:1px solid rgba(255,60,168,.55);border-radius:6px;background:rgba(26,12,20,.5);
  font-size:clamp(15px,1.7vw,22px);color:#f0d0e2;letter-spacing:.04em;line-height:1.9;
  box-shadow:0 0 26px rgba(255,60,168,.12),inset 0 0 30px rgba(255,60,168,.05);
  transition:border-color .6s var(--ease),background .6s var(--ease),color .6s var(--ease),box-shadow .6s var(--ease);}
#doubtEvent .badge{display:inline-block;font-size:.6em;letter-spacing:.2em;color:#ff7ac4;border:1px solid rgba(255,60,168,.7);
  border-radius:3px;padding:.1em .5em;margin-right:.6em;vertical-align:.1em;font-family:"Courier New",ui-monospace,monospace;
  text-shadow:1px 0 #39d0ff,-1px 0 #ff3ca8;}
#doubtEvent.settled{border-color:var(--jade-hi);background:rgba(20,34,30,.5);color:var(--jade-hi);box-shadow:0 0 40px rgba(168,220,203,.2);}
#doubtEvent.settled .badge{color:var(--jade-hi);border-color:var(--jade);text-shadow:none;}
#doubtPool{position:absolute;left:0;right:0;top:32vh;height:36vh;}
.tempt{position:absolute;transform:translate(-50%,-50%);padding:.45em .95em;border-radius:20px;cursor:none;white-space:nowrap;
  font-size:clamp(13px,1.3vw,17px);color:#f0c8d8;background:rgba(34,12,22,.62);border:1px solid rgba(255,60,168,.55);
  text-shadow:0 0 6px rgba(255,60,168,.4);transition:.3s var(--ease);}
.tempt:hover{border-color:#ff3ca8;box-shadow:0 0 18px rgba(255,60,168,.45);transform:translate(-50%,-50%) scale(1.06);}
#doubtCalm{position:absolute;left:50%;bottom:20vh;transform:translateX(-50%);display:flex;align-items:center;gap:.8em;width:min(440px,76vw);}
.calmlbl{font-size:12px;letter-spacing:.16em;color:var(--jade-hi);white-space:nowrap;}
.calmbar{flex:1;height:9px;border:1px solid var(--jade);border-radius:6px;overflow:hidden;background:rgba(10,16,12,.6);}
.calmbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--jade),var(--jade-hi));transition:width .12s;}
#watchBtn{position:absolute;left:50%;bottom:11vh;transform:translateX(-50%);margin-top:0;}
/* 选择卡（妄议 or 静观） */
.dchoice{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(580px,88vw);text-align:center;
  background:rgba(20,14,13,.66);border:1px solid rgba(176,89,78,.4);border-radius:14px;padding:2.4vh 2.4vw;
  backdrop-filter:blur(3px);box-shadow:0 18px 50px -20px #000;animation:fadeIn .4s var(--ease);transition:border-color .4s;}
.dchoice .dq{font-size:clamp(15px,1.8vw,23px);color:#ecd9d3;line-height:1.7;margin-bottom:2vh;}
.dbtns{display:flex;gap:1.4em;justify-content:center;flex-wrap:wrap;}
.dbtn{padding:.75em 1.7em;border-radius:9px;cursor:none;font-size:clamp(13px,1.4vw,18px);letter-spacing:.08em;transition:.3s var(--ease);}
/* 妄议 = 递刀（赛博红故障） · 静观 = 玉色水墨 */
.dbtn.bad{border:1px solid rgba(255,60,168,.6);background:rgba(255,60,168,.12);color:#f4c4dc;text-shadow:0 0 6px rgba(255,60,168,.4);}
.dbtn.bad:hover{background:rgba(255,60,168,.26);box-shadow:0 0 20px rgba(255,60,168,.5);text-shadow:1.2px 0 #39d0ff,-1.2px 0 #ff3ca8;}
.dbtn.good{border:1px solid var(--jade);background:rgba(111,182,163,.1);color:var(--jade-hi);}
.dbtn.good:hover{background:rgba(111,182,163,.26);box-shadow:0 0 18px rgba(168,220,203,.45);text-shadow:0 0 10px rgba(168,220,203,.5);}
.dchoice.picked-good{border-color:var(--jade-hi);} .dchoice.picked-bad{border-color:var(--crimson);}
/* 删帖模拟 */
.dellist{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,88vw);display:flex;flex-direction:column;gap:1.1vh;}
.delpost{display:flex;justify-content:space-between;align-items:center;gap:1em;padding:.75em 1.1em;border-radius:9px;
  background:rgba(30,18,16,.62);border:1px solid rgba(176,89,78,.32);font-size:clamp(13px,1.4vw,18px);color:#e7cfc9;transition:.5s var(--ease);}
.delpost em{font-style:normal;font-size:.78em;color:var(--crimson-hi);white-space:nowrap;}
.delpost.deleting{opacity:.45;transform:translateX(8px);}
.delpost.deleted{color:#6c7a76;border-color:rgba(108,122,118,.3);background:rgba(12,16,16,.5);}
.delpost.deleted span{text-decoration:line-through;text-decoration-color:rgba(176,89,78,.55);}
/* 弹幕骂战 */
#danmu{position:absolute;left:0;right:0;top:6vh;height:66vh;z-index:51;pointer-events:none;overflow:hidden;}
.danmu{position:absolute;left:100%;white-space:nowrap;font-size:clamp(13px,1.5vw,20px);font-weight:700;
  color:#cdd8d2;text-shadow:0 2px 8px #000,0 0 2px #000;will-change:transform;animation:danfly linear forwards;}
/* 辱骂弹幕 = 飞来的"刀"：品红故障·斜冲 */
.danmu.hot{color:#ff6a8a;font-style:italic;text-shadow:1px 0 #ff3ca8,-1px 0 #39d0ff,0 2px 8px #000;}
/* 克制之声 = 玉色水墨 */
.danmu.cool{color:var(--jade-hi);text-shadow:0 0 8px rgba(168,220,203,.4),0 2px 8px #000;}
@keyframes danfly{from{transform:translateX(0);}to{transform:translateX(-130vw);}}

/* ============ 破茧厅（高潮·全屏） ============ */
#cocoonField{position:absolute;inset:0;z-index:56;display:none;overflow:hidden;
  background:radial-gradient(130% 100% at 50% 45%, rgba(22,17,12,.82), rgba(6,8,8,.96));}
#cocoonField.on{display:block;animation:fadeIn 1s var(--ease) both;}
#camCocoon{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);
  opacity:.16;filter:grayscale(.5) sepia(.25) brightness(.85);}
#cocoonRings,#silkWrap{position:absolute;inset:0;pointer-events:none;}
.cring{position:absolute;left:50%;top:50%;border-radius:50%;border:1px solid rgba(138,122,94,.5);transform:translate(-50%,-50%);
  box-shadow:0 0 30px rgba(138,122,94,.2) inset;animation:spin 24s linear infinite;transition:opacity .6s var(--ease),border-color .6s;}
.silk{position:absolute;left:50%;top:50%;height:1px;transform-origin:left center;pointer-events:none;transition:opacity .5s var(--ease);
  background:linear-gradient(90deg,rgba(182,168,134,.7),rgba(182,168,134,0));}
.pref{position:absolute;transform:translate(-50%,-50%);font-size:clamp(12px,1.2vw,16px);color:#b6a886;white-space:nowrap;
  background:rgba(26,24,18,.6);border:1px solid rgba(138,122,94,.5);border-radius:3px;padding:.3em .7em;pointer-events:none;
  transition:opacity .5s var(--ease),transform .5s var(--ease);}
/* 拆茧反馈：丝线与偏好词被“扯断”飞散 */
.pref.snap{animation:prefSnap .6s var(--ease) forwards;}
@keyframes prefSnap{0%{opacity:.95;}100%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(28deg);}}
.silk.snap{animation:silkSnap .5s var(--ease) forwards;}
@keyframes silkSnap{0%{opacity:.8;}40%{opacity:1;filter:brightness(2);}100%{opacity:0;transform:scaleX(.2);}}
#cocoonCore.hit{animation:coreHit .16s ease-out;}
@keyframes coreHit{50%{filter:brightness(1.9) drop-shadow(0 0 3vmin rgba(231,210,160,.8));}}
#cocoonHud{position:absolute;left:0;right:0;bottom:6vh;z-index:5;display:flex;flex-direction:column;align-items:center;gap:1.4vh;text-shadow:0 2px 8px #000;}
.brkwrap{display:flex;align-items:center;gap:.8em;width:min(560px,78vw);}
.brklbl{font-size:13px;letter-spacing:.2em;color:var(--gold-hi);white-space:nowrap;}
.brkbar{flex:1;height:13px;border:1px solid var(--gold);border-radius:7px;overflow:hidden;background:rgba(10,16,12,.6);}
.brkbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-hi));transition:width .15s;}
.brkhint{font-size:clamp(15px,1.7vw,22px);letter-spacing:.06em;color:var(--jade-hi);text-align:center;padding:0 4vw;}
#liberateFx{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;
  background:radial-gradient(closest-side,rgba(255,250,240,.95),rgba(231,210,160,.45) 38%,transparent 72%);}
#liberateFx.go{animation:liber 1.6s var(--ease);}
@keyframes liber{0%{opacity:0;transform:scale(.15);}26%{opacity:1;}100%{opacity:0;transform:scale(2.8);}}
#shatter{position:absolute;inset:0;z-index:7;pointer-events:none;}

/* ============ 破茧厅·赛博水墨层（原型）============================
   理念：茧 = 算法的牢笼，用故障/数据/霓虹表达；--corrupt(1→0) 随
   破茧进度退潮，赛博褪去、水墨玉光归来。只作用于 #cocoonField。
   霓虹双色：青 #39d0ff / 品红 #ff3ca8（反派专用，不与玉金朱砂混）
   =============================================================== */
#cocoonField{--corrupt:1;}
/* 数据雨（茧外的信息洪流） */
#dataRain{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.9;mix-blend-mode:screen;}
/* 故障天幕：扫描线 + 色差呼吸 */
#cyberVeil{position:absolute;inset:0;z-index:4;pointer-events:none;mix-blend-mode:screen;
  opacity:calc(var(--corrupt)*.85);transition:opacity .45s linear;}
#cyberVeil::before{content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg, rgba(57,208,255,.07) 0 1px, transparent 1px 3px);
  animation:scanMove 7s linear infinite;}
@keyframes scanMove{to{background-position:0 128px;}}
#cyberVeil::after{content:"";position:absolute;inset:0;filter:blur(2px);mix-blend-mode:screen;
  background:radial-gradient(58% 50% at 50% 50%, rgba(255,60,168,.12), transparent 62%),
             radial-gradient(48% 40% at 50% 50%, rgba(57,208,255,.12), transparent 62%);
  animation:cyberFlick 3.3s steps(7) infinite;}
@keyframes cyberFlick{0%,90%,100%{opacity:.7;transform:translateX(0);}
  92%{opacity:.22;transform:translateX(2px);}96%{opacity:.95;transform:translateX(-2px);}}
/* 茧壳：金环 → 数据环（虚线 + 霓虹） */
#cocoonField .cring{border-style:dashed;border-color:rgba(57,208,255,calc(var(--corrupt)*.6));
  box-shadow:0 0 24px rgba(57,208,255,calc(var(--corrupt)*.22)) inset,
             0 0 16px rgba(255,60,168,calc(var(--corrupt)*.16));}
/* 偏好词条 → 算法数据标签（等宽 + 霓虹 + 色差抖动） */
#cocoonField .pref{font-family:"Courier New",ui-monospace,monospace;letter-spacing:.03em;
  color:#cdeeff;background:rgba(7,15,21,calc(.55+var(--corrupt)*.25));
  border-color:rgba(57,208,255,calc(.3+var(--corrupt)*.5));border-radius:2px;
  box-shadow:0 0 12px rgba(57,208,255,calc(var(--corrupt)*.3));
  animation:tagGlitch 4.2s steps(8) infinite;}
#cocoonField .pref::before{content:"› ";color:#ff3ca8;}
@keyframes tagGlitch{0%,88%,100%{text-shadow:0 0 6px rgba(57,208,255,.5);}
  90%{text-shadow:1.6px 0 #ff3ca8,-1.6px 0 #39d0ff;}94%{text-shadow:-1.6px 0 #ff3ca8,1.6px 0 #39d0ff;}}
#cocoonField .silk{background:linear-gradient(90deg, rgba(57,208,255,calc(var(--corrupt)*.75)), rgba(255,60,168,0));}
/* 黑化立绘：RGB 色差描边，随退潮消解 */
#cocoonField #cocoonCore{filter:drop-shadow(2px 0 rgba(255,60,168,calc(var(--corrupt)*.5)))
  drop-shadow(-2px 0 rgba(57,208,255,calc(var(--corrupt)*.5)));transition:filter .45s linear;}
/* 摄像头底片偏冷信号感 */
#cocoonField #camCocoon{filter:grayscale(.6) brightness(.82) contrast(1.1) sepia(.12) hue-rotate(160deg);}
/* 进度条：赛博青 →（解密）→ 玉色，破茧即求真 */
#cocoonField .brklbl{color:#bdecff;}
#cocoonField .brkbar{border-color:#39d0ff;}
#cocoonField .brkbar>i{background:linear-gradient(90deg,#39d0ff,#a8dccb);}

/* ============ 御器向善（居中纵列：内容自适应，按钮永不被裁切） ============ */
#p-tame.live{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.4vh;padding:9vh 5vw 7vh;}
#tameNet{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;opacity:.85;}
#tameHint{position:relative;text-align:center;width:min(40em,90vw);z-index:2;
  font-size:clamp(13px,1.4vw,18px);letter-spacing:.06em;color:var(--paper-dim);}
#dials{position:relative;z-index:2;display:flex;flex-direction:row;justify-content:center;align-items:flex-start;
  gap:clamp(1.4em,5vw,4em);width:min(680px,94vw);flex-wrap:wrap;}
/* 御器 = 转动旋钮：拧动每一维从「算法默认」转向「向善」，活网实时变暖 */
.dial{display:flex;flex-direction:column;align-items:center;gap:1.1vh;}
.dial .dq{font-family:var(--kai);font-size:clamp(14px,1.5vw,19px);color:var(--gold);letter-spacing:.1em;}
.knob{position:relative;width:clamp(86px,12vw,132px);aspect-ratio:1;border-radius:50%;cursor:none;touch-action:none;
  background:radial-gradient(circle at 38% 30%, #1a2724, #0b1311 60%, #050b0a);
  box-shadow:0 10px 26px -10px #000, inset 0 2px 7px rgba(255,255,255,.07), inset 0 0 0 1px rgba(255,255,255,.07);
  transition:box-shadow .35s,filter .35s;animation:knobIdle 3.4s ease-in-out infinite;}
@keyframes knobIdle{50%{box-shadow:0 10px 26px -10px #000, inset 0 2px 7px rgba(255,255,255,.07), inset 0 0 0 1px rgba(255,255,255,.07), 0 0 16px rgba(255,60,168,.12);}}
/* 底环刻度（红→青→玉的 270° 弧） */
.knob::before{content:"";position:absolute;inset:7%;border-radius:50%;
  background:conic-gradient(from 225deg, rgba(255,60,168,.55) 0deg, rgba(57,208,255,.32) 135deg, rgba(111,182,163,.6) 270deg, transparent 270deg);
  -webkit-mask:radial-gradient(transparent 58%,#000 60%);mask:radial-gradient(transparent 58%,#000 60%);opacity:.5;}
/* 进度弧（随拧动点亮成玉色） */
.kfill{position:absolute;inset:7%;border-radius:50%;pointer-events:none;opacity:.92;
  background:conic-gradient(from 225deg, var(--jade-hi) 0deg, var(--jade-hi) var(--a,0deg), transparent var(--a,0deg));
  -webkit-mask:radial-gradient(transparent 58%,#000 60%);mask:radial-gradient(transparent 58%,#000 60%);transition:opacity .3s;}
/* 中心钮帽 */
.knob::after{content:"";position:absolute;left:50%;top:50%;width:46%;aspect-ratio:1;border-radius:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle at 40% 34%,#273a35,#0d1614 70%);box-shadow:0 2px 4px #000,inset 0 0 0 1px rgba(255,255,255,.06);}
/* 指针 */
.kptr{position:absolute;left:50%;top:50%;width:4px;height:40%;border-radius:3px;transform-origin:50% 100%;pointer-events:none;z-index:2;
  transform:translate(-50%,-100%) rotate(var(--r,-135deg));
  background:linear-gradient(#fff,#a8dccb);box-shadow:0 0 10px rgba(168,220,203,.85);}
.knob.bad{box-shadow:0 10px 26px -10px #000, inset 0 0 0 1px rgba(255,60,168,.28), 0 0 18px rgba(255,60,168,.16);animation:none;}
.knob.bad .kptr{background:linear-gradient(#fff,#ff8fcf);box-shadow:0 0 10px rgba(255,60,168,.7);}
.knob.good{box-shadow:0 10px 28px -8px #000, inset 0 0 0 1px rgba(168,220,203,.45), 0 0 34px rgba(168,220,203,.45);animation:none;}
.dlabels{display:flex;justify-content:space-between;width:clamp(104px,15vw,158px);font-size:clamp(11px,1.1vw,14px);}
.dlabels .sbad{color:#9a6f78;transition:.3s;} .dlabels .sgood{color:#5d8f80;transition:.3s;}
.knob.bad ~ .dlabels .sbad{color:#ff6ec0;text-shadow:0 0 8px rgba(255,60,168,.45);}
.knob.good ~ .dlabels .sgood{color:var(--jade-hi);text-shadow:0 0 9px rgba(168,220,203,.55);}
#tameVerdict{position:relative;z-index:2;width:min(40em,88vw);text-align:center;
  font-size:clamp(14px,1.6vw,20px);line-height:1.9;color:#d6ccb6;min-height:1.4em;}
#tameNext{position:relative;z-index:2;display:none;margin-top:0;}
#tameNext.ready{animation:tameReady 1.3s ease-in-out infinite;}
@keyframes tameReady{50%{box-shadow:0 0 34px rgba(168,220,203,.6),inset 0 0 22px rgba(168,220,203,.12);}}
#tameNext.soft{opacity:.6;border-color:#33524d;color:var(--paper-dim);}

/* ============ 涟漪尾厅（满屏·首尾呼应封面的水墨满景） ============ */
#ecoCanvas{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:0;
  background:transparent;cursor:none;z-index:1;}
/* 底部压暗，保证结语永远读得清 */
#p-ripple.live::after{content:"";position:absolute;left:0;right:0;bottom:0;height:34vh;z-index:1;pointer-events:none;
  background:linear-gradient(transparent,rgba(4,8,9,.66) 60%,rgba(3,6,7,.9));}
#rippleWord{position:absolute;left:50%;bottom:11vh;transform:translateX(-50%);width:min(44em,90vw);text-align:center;z-index:3;
  font-size:clamp(16px,1.8vw,24px);line-height:2;color:#e6ddc9;text-shadow:0 2px 14px rgba(0,0,0,.8);
  transition:opacity 1.2s var(--ease);opacity:0;}
#ecoOps{position:absolute;left:50%;bottom:3.5vh;transform:translateX(-50%);display:flex;gap:1.2em;z-index:5;}

/* 信息素养·收束卡：把五幕练成的本事收拢成能带走的东西 */
#p-ripple.creedon #ecoCanvas{opacity:.4;transition:opacity 1.2s var(--ease);}
#creed{position:absolute;left:50%;top:48%;transform:translate(-50%,-44%);z-index:4;width:min(660px,92vw);
  padding:3.2vh 2.4em 2.8vh;text-align:center;opacity:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(10,17,16,.88),rgba(6,11,11,.93));
  border:1px solid rgba(196,163,104,.4);border-radius:16px;backdrop-filter:blur(6px);
  box-shadow:0 30px 80px -30px #000,inset 0 0 60px rgba(0,0,0,.4);
  transition:opacity 1.1s var(--ease),transform 1.1s var(--ease);}
#creed.show{opacity:1;transform:translate(-50%,-50%);pointer-events:auto;}
#creed h2{font-family:var(--brush);font-weight:500;font-size:clamp(21px,3vw,36px);color:var(--gold-hi);letter-spacing:.06em;
  text-shadow:0 0 22px rgba(196,163,104,.4);margin-bottom:.25em;line-height:1.25;}
#creed .creed-sub{font-family:var(--sans);font-weight:300;font-size:clamp(11px,1.2vw,14px);letter-spacing:.34em;margin-right:-.34em;color:var(--jade);opacity:.82;margin-bottom:2.2vh;}
#creed ul{list-style:none;text-align:left;display:flex;flex-direction:column;gap:1.15vh;margin:0 auto;width:fit-content;max-width:100%;}
#creed li{font-family:var(--kai);font-size:clamp(14px,1.7vw,21px);color:#e2dac8;line-height:1.5;padding-left:2.3em;position:relative;}
#creed li b{color:var(--jade-hi);font-weight:700;}
#creed li .n{position:absolute;left:0;top:-.04em;font-family:var(--brush);color:var(--gold);font-size:1.2em;opacity:.92;}
#creed .creed-foot{margin-top:2.3vh;font-family:var(--serif);font-size:clamp(13px,1.5vw,18px);color:#d0c7b3;line-height:1.85;}
#creed .creed-foot .em{color:var(--jade-hi);}

/* 震撼大字 */
#impact{position:absolute;inset:0;z-index:85;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;}
#impact span{font-size:min(24vh,22vw);font-weight:900;letter-spacing:.18em;margin-right:-.18em;color:var(--gold-hi);
  text-shadow:0 0 64px rgba(168,220,203,.8),0 0 22px var(--jade-hi),0 0 6px #fff;}
#impact.go{animation:impactk 1s var(--ease);}
@keyframes impactk{0%{opacity:0;transform:scale(2.4) rotate(-4deg);}20%{opacity:1;transform:scale(1) rotate(0);}68%{opacity:1;}100%{opacity:0;transform:scale(1.12);}}
@keyframes cpulse{0%,100%{opacity:.72;}50%{opacity:1;transform:scale(1.12);}}

/* 竖屏提示 */
#rotate{position:absolute;inset:0;z-index:999;background:var(--ink);display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:8vw;gap:2vh;cursor:auto;}
@media (orientation:portrait){#rotate{display:flex;}}
@media (hover:none){html,body,.act,.frag,.dopt,.tempt,#sound,#skip{cursor:auto;} #cursor{display:none;}}

/* ============================================================
   竖屏适配：横屏更佳，但竖屏也能完整体验（手机受众）
   ============================================================ */
@media (orientation:portrait){
  /* 封面：朱印移到标题下方居中，整体收一档 */
  .cv-titlewrap{flex-direction:column;align-items:center;gap:1vh;}
  .cv-seal{margin-top:.4vh;width:clamp(40px,12vw,72px);}
  .cv-title{font-size:clamp(54px,18vw,132px);}
  .cv-kicker{font-size:clamp(10px,2.6vw,14px);letter-spacing:.34em;margin-right:-.34em;}
  .cv-poem{font-size:clamp(15px,4.4vw,24px);letter-spacing:.32em;margin-right:-.32em;}
  .cv-sub{font-size:clamp(13px,3.6vw,18px);}
  /* 对白：占满下半屏、字大、易点 */
  #dialogue{width:94vw;bottom:3vh;padding:2.8vh 6vw 3.2vh;}
  #dlgText{font-size:clamp(16px,4.4vw,22px);line-height:1.8;}
  #dlgWho{font-size:clamp(13px,3.4vw,16px);}
  /* 御器旋钮：缩小，确保一行放得下 */
  #dials{gap:4vw;width:auto;}
  .knob{width:clamp(70px,22vw,110px);}
  .dlabels{width:clamp(88px,26vw,142px);font-size:clamp(10px,2.8vw,13px);}
  .dial .dq{font-size:clamp(13px,3.4vw,17px);}
  #tameHint,#tameVerdict{font-size:clamp(12px,3.2vw,16px);}
  /* 补正台：留出左右边距 */
  #amendStage{padding:0 4vw;}
  /* 收束卡：占满宽 */
  #creed{width:94vw;padding:3vh 1.3em 2.6vh;}
  #creed li{font-size:clamp(13px,3.8vw,19px);padding-left:2em;}
  /* 章节标记缩小，别压内容 */
  #hallmark{left:1.5vw;font-size:11px;}
}

/* ============================================================
   V6 开篇封面 · 赛博水墨卷轴（重画）
   一轮玉月、远山、漂浮的墨晕与升腾的金尘，
   书法主标题旁落一方朱印——把"一束光的远行"立在画里。
   ============================================================ */
#cover{position:absolute;inset:0;z-index:120;overflow:hidden;cursor:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:
    radial-gradient(120% 90% at 50% -16%, rgba(168,220,203,.12), transparent 56%),
    radial-gradient(90% 80% at 50% 124%, rgba(196,163,104,.09), transparent 62%),
    radial-gradient(150% 130% at 50% 46%, #0c1517 0%, #070c0e 52%, #04070800 100%),
    linear-gradient(#080e10,#04080a);
  transition:opacity .9s var(--ease),transform .9s var(--ease);}
#cover.leave{opacity:0;transform:scale(1.06);pointer-events:none;}

/* 玉月 + 月晕 */
.cv-moon{position:absolute;top:9%;left:50%;width:15vmin;aspect-ratio:1;border-radius:50%;transform:translateX(-50%);
  background:radial-gradient(circle at 40% 36%, #f4efe1, #d6e6da 50%, #7fae9f 100%);
  box-shadow:0 0 9vmin rgba(168,220,203,.40),0 0 22vmin rgba(168,220,203,.16),0 0 40vmin rgba(168,220,203,.07);
  animation:cvMoon 9s ease-in-out infinite;}
.cv-moon::after{content:"";position:absolute;inset:-46%;border-radius:50%;
  border:1px solid rgba(168,220,203,.12);box-shadow:0 0 4vmin rgba(168,220,203,.08) inset;}
@keyframes cvMoon{50%{filter:brightness(1.08);box-shadow:0 0 12vmin rgba(168,220,203,.5),0 0 26vmin rgba(168,220,203,.2),0 0 46vmin rgba(168,220,203,.09);}}

/* 漂浮墨晕（水墨在动） */
.cv-ink{position:absolute;border-radius:50%;filter:blur(36px);mix-blend-mode:screen;pointer-events:none;opacity:.5;}
.cv-ink.a{width:60vmin;height:42vmin;left:6%;top:24%;background:radial-gradient(circle,rgba(60,111,99,.5),transparent 68%);animation:cvDrift1 26s ease-in-out infinite;}
.cv-ink.b{width:52vmin;height:40vmin;right:4%;top:34%;background:radial-gradient(circle,rgba(196,163,104,.32),transparent 66%);animation:cvDrift2 32s ease-in-out infinite;}
.cv-ink.c{width:80vmin;height:50vmin;left:50%;bottom:-6%;transform:translateX(-50%);background:radial-gradient(circle,rgba(40,70,66,.55),transparent 70%);animation:cvDrift3 38s ease-in-out infinite;}
@keyframes cvDrift1{50%{transform:translate(6vw,-4vh) scale(1.12);opacity:.7;}}
@keyframes cvDrift2{50%{transform:translate(-5vw,3vh) scale(1.08);opacity:.6;}}
@keyframes cvDrift3{50%{transform:translate(calc(-50% + 4vw),-3vh) scale(1.1);opacity:.7;}}

/* 远山剪影（双层景深） */
.cv-mts{position:absolute;left:-4%;right:-4%;bottom:0;pointer-events:none;}
.cv-mts i{position:absolute;left:0;right:0;display:block;}
.cv-mts .m1{bottom:9%;height:30vh;opacity:.55;
  background:linear-gradient(transparent 36%,#0b1a1a 37%,#081312 100%);
  clip-path:polygon(0 100%,0 60%,13% 40%,27% 56%,39% 32%,53% 55%,66% 28%,79% 53%,90% 38%,100% 55%,100% 100%);}
.cv-mts .m2{bottom:0;height:24vh;opacity:.92;
  background:linear-gradient(transparent 26%,#091413 27%,#04080a 100%);
  clip-path:polygon(0 100%,0 70%,16% 48%,32% 68%,48% 42%,63% 66%,80% 44%,100% 64%,100% 100%);}
/* 倒影微光带 */
.cv-mts::after{content:"";position:absolute;left:0;right:0;bottom:0;height:14vh;mix-blend-mode:screen;
  background:linear-gradient(transparent,rgba(60,111,99,.10) 40%,rgba(8,16,16,.5));}

/* 升腾金尘 */
.cv-motes{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.cv-mote{position:absolute;bottom:-4vh;width:3px;height:3px;border-radius:50%;
  background:radial-gradient(circle,#f0e6c6,rgba(231,210,160,.5) 55%,transparent 72%);
  box-shadow:0 0 6px rgba(231,210,160,.7);opacity:0;animation:cvRise linear infinite;}
@keyframes cvRise{0%{opacity:0;transform:translateY(0) translateX(0);}10%{opacity:.9;}90%{opacity:.7;}100%{opacity:0;transform:translateY(-104vh) translateX(var(--dx,2vw));}}

/* 主内容 */
.cv-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:2.6vh;padding:4vh 6vw;
  animation:cvFade 1.3s var(--ease) both;}
@keyframes cvFade{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
.cv-kicker{font-family:var(--sans);font-weight:300;font-size:clamp(11px,1.2vw,15px);letter-spacing:.62em;margin-right:-.62em;
  color:var(--jade-hi);opacity:.82;}
.cv-titlewrap{position:relative;display:inline-flex;align-items:flex-start;gap:1.4vw;}
.cv-title{font-family:var(--brush);font-size:clamp(56px,12vw,200px);font-weight:500;letter-spacing:.12em;margin-right:-.12em;line-height:1;
  color:#f2ead7;text-shadow:0 0 40px rgba(168,220,203,.22),0 3px 6px rgba(0,0,0,.6),0 0 2px rgba(0,0,0,.8);
  animation:cvBrush 1.5s var(--ease) both;}
.cv-title .glow{color:var(--gold-hi);text-shadow:0 0 40px rgba(231,210,160,.65),0 0 16px rgba(196,163,104,.5);}
@keyframes cvBrush{from{opacity:0;filter:blur(14px);letter-spacing:.5em;}to{opacity:1;filter:blur(0);letter-spacing:.12em;}}
/* 朱印 */
.cv-seal{align-self:flex-start;margin-top:1.6vmin;width:clamp(40px,5.6vw,86px);aspect-ratio:1;
  display:grid;place-items:center;border-radius:6px;transform:rotate(-3deg);
  background:linear-gradient(160deg,#c0463a,#9a342c);
  box-shadow:0 0 0 2px rgba(176,89,78,.5),0 6px 18px -8px #000,inset 0 0 0 3px rgba(255,225,210,.18),inset 0 0 16px rgba(60,10,6,.4);
  animation:cvSeal 1s var(--ease) .9s both;}
.cv-seal span{font-family:var(--kai);font-weight:700;color:#ffe9df;font-size:clamp(20px,3vw,46px);line-height:1;
  letter-spacing:0;text-shadow:0 1px 1px rgba(60,10,6,.6);}
@keyframes cvSeal{0%{opacity:0;transform:rotate(-3deg) scale(1.6);}60%{opacity:1;transform:rotate(-3deg) scale(.92);}100%{opacity:1;transform:rotate(-3deg) scale(1);}}
/* 笔锋分隔 */
.cv-rule{display:flex;align-items:center;gap:1.2em;opacity:.9;}
.cv-rule i{display:block;width:min(20vw,180px);height:2px;border-radius:2px;
  background:linear-gradient(90deg,transparent,var(--gold),rgba(231,210,160,.9));}
.cv-rule i:last-child{background:linear-gradient(90deg,rgba(231,210,160,.9),var(--gold),transparent);}
.cv-rule b{width:7px;height:7px;border-radius:50%;background:var(--crimson);box-shadow:0 0 10px rgba(176,89,78,.8);}
.cv-sub{font-family:var(--serif);font-size:clamp(14px,1.6vw,20px);line-height:2.05;color:#d3ccbb;max-width:34em;letter-spacing:.04em;}
.cv-sub .em{color:var(--gold-hi);}
.cv-sub small{display:block;margin-top:1.1em;font-family:var(--sans);font-weight:300;font-size:.78em;letter-spacing:.14em;color:#7d8a83;opacity:.85;}
.cv-poem{font-family:var(--kai);font-size:clamp(15px,1.9vw,26px);letter-spacing:.42em;margin-right:-.42em;
  color:var(--jade-hi);opacity:.86;text-shadow:0 0 18px rgba(168,220,203,.3);margin-top:-.6vh;
  animation:cvFade 1.5s var(--ease) .5s both;}
.cv-go{margin-top:1.2vh;font-family:var(--kai);}

/* ============================================================
   性能与无障碍：弱机压低模糊/持续动画；尊重"减少动态"系统偏好
   ============================================================ */
#stage.lowfx .cv-ink{filter:blur(20px);}
#stage.lowfx #mist i{filter:blur(24px);}
#stage.lowfx #mist{opacity:.4!important;}
#stage.lowfx #grain{display:none;}
#stage.lowfx .cv-moon::after{display:none;}
@media (prefers-reduced-motion: reduce){
  #grain,.cv-mote,.cv-ink,.cv-moon,#mist i,#stars i,.knob,.cv-title,.cv-poem,.cv-inner{animation:none!important;}
  .cv-ink{filter:blur(22px);opacity:.4;} #mist i{filter:blur(26px);}
  *{scroll-behavior:auto!important;}
}
</style>

<div id="rotate"><h1 class="title" style="font-size:13vw">横 屏 更 佳</h1><p class="tiny" style="font-size:14px;max-width:24em">这是一段横屏 / 大屏的沉浸叙事；竖屏也能完整体验，只是画面会窄一些。</p><button class="act" id="rotateGo" style="margin-top:1.4vh">竖 屏 继 续 ▷</button></div>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const STATE={alias:"无名客", purified:0, fed:0};
const rnd=(a,b)=>a+Math.random()*(b-a);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const stage=$("#stage");

/* ============================================================
   光标·提灯 + 视差（“世界随你而动”——大屏的震撼来源）
   ============================================================ */
const cursor=$("#cursor"), lantern=$("#lantern");
let pmx=0.5, pmy=0.5; // 归一化指针
function onMove(cx,cy){ pmx=cx/window.innerWidth; pmy=cy/window.innerHeight;
  cursor.style.left=cx+"px"; cursor.style.top=cy+"px";
  lantern.style.left=cx+"px"; lantern.style.top=cy+"px"; }
window.addEventListener("pointermove",e=>onMove(e.clientX,e.clientY),{passive:true});
window.addEventListener("pointerover",e=>{ stage.classList.toggle("cursor-hot", !!e.target.closest(".act,.frag,.dopt,.tempt,#sound,#skip,.amend-emo,.amend-abs,input")); });
if(window.DeviceOrientationEvent){ window.addEventListener("deviceorientation",e=>{ if(e.gamma!=null){ pmx=0.5+Math.max(-1,Math.min(1,e.gamma/40))*0.5; pmy=0.5+Math.max(-1,Math.min(1,(e.beta-30)/40))*0.5; } },{passive:true}); }

const depthEls=$$("[data-depth]");
let curMX=0.5,curMY=0.5;
function parallaxLoop(){ curMX+=(pmx-curMX)*0.06; curMY+=(pmy-curMY)*0.06;
  const ox=(curMX-0.5), oy=(curMY-0.5);
  for(const el of depthEls){ const d=parseFloat(el.dataset.depth)||0;
    el.style.transform=(el.classList.contains("moon")?"translateX(-50%) ":"")+"translate3d("+(-ox*d*70)+"px,"+(-oy*d*46)+"px,0)"; }
  // 同行者也轻微随动（保留它“在场”的体感）
  if(spirit){ spirit.style.marginLeft=(-ox*spiritDepth*60)+"px"; spirit.style.marginTop=(-oy*spiritDepth*40)+"px"; }
  for(const f of crowdFigs){ f.style.marginLeft=(-ox*f._depth*60)+"px"; f.style.marginTop=(-oy*f._depth*30)+"px"; }
  requestAnimationFrame(parallaxLoop);
}
const spirit=$("#spirit"); let spiritDepth=0.4;
requestAnimationFrame(parallaxLoop);

/* ============================================================
   氛围引擎：灵气流 / 光尘 / 流萤（满屏景深粒子）
   ============================================================ */
const cv=$("#atmos"), cx=cv.getContext("2d");
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){ W=window.innerWidth; H=window.innerHeight;
  cv.style.width=W+"px"; cv.style.height=H+"px"; cv.width=W*DPR; cv.height=H*DPR; cx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener("resize",resize); resize();
const layers=[
  {n:80,r:[.4,1.1],sp:[.02,.08],a:[.06,.18],c:"168,220,203",drift:.2},
  {n:52,r:[.8,2.0],sp:[.05,.16],a:[.10,.30],c:"196,180,140",drift:.5},
  {n:16,r:[1.4,3.0],sp:[.10,.30],a:[.25,.55],c:"231,210,160",drift:1.0},
];
const parts=[];
layers.forEach((L,li)=>{ for(let i=0;i<L.n;i++) parts.push({
  x:rnd(0,1),y:rnd(0,1),r:rnd(L.r[0],L.r[1]),sp:rnd(L.sp[0],L.sp[1])/100,
  a:rnd(L.a[0],L.a[1]),ph:rnd(0,Math.PI*2),c:L.c,drift:L.drift,li}); });
let mood=0; // 0 平静 → 1 妖气
function atmos(){ cx.clearRect(0,0,W,H);
  const px=(curMX-0.5), py=(curMY-0.5);
  for(const p of parts){ p.y-=p.sp*(1+mood*.6); p.ph+=0.01;
    if(p.y<-0.02){p.y=1.02; p.x=Math.random();}
    const depth=(p.li+1)/3;
    const x=(p.x*W)+Math.sin(p.ph)*p.drift*22*(1+mood)-px*depth*60, y=p.y*H-py*depth*40, r=p.r*(1+0.25*Math.sin(p.ph*1.7));
    const col=(mood>.5 && p.li<2)?"176,89,78":p.c;
    const g=cx.createRadialGradient(x,y,0,x,y,r*4);
    g.addColorStop(0,"rgba("+col+","+p.a+")"); g.addColorStop(1,"rgba("+col+",0)");
    cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r*4,0,6.2832); cx.fill();
  }
  requestAnimationFrame(atmos);
}
requestAnimationFrame(atmos);
function setMood(v){ const s=mood,t0=performance.now();
  (function tw(){ const k=Math.min(1,(performance.now()-t0)/900); mood=s+(v-s)*k; if(k<1)requestAnimationFrame(tw); })(); }

/* ============================================================
   音频：水墨·玄光 氛围（古筝 + 箫垫 + 钟磬 + 风）
   ============================================================ */
let actx=null, amb=null, muted=false, pluckT=null;
function initAudio(){ if(actx)return; try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function noise(sec,brown){ const n=Math.floor(actx.sampleRate*sec),b=actx.createBuffer(1,n,actx.sampleRate),d=b.getChannelData(0);let last=0;
  for(let i=0;i<n;i++){const w=Math.random()*2-1; if(brown){last=(last+.02*w)/1.02;d[i]=last*3.2;}else d[i]=w;} return b; }
function impulse(sec,dec){ const n=Math.floor(actx.sampleRate*sec),b=actx.createBuffer(2,n,actx.sampleRate);
  for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,dec);} return b; }
function startAmb(){ if(!actx||amb)return; amb={}; const n=actx.currentTime;
  const master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
  master.gain.linearRampToValueAtTime(muted?0:.85,n+3.5); amb.master=master;
  const conv=actx.createConvolver(); conv.buffer=impulse(4.2,2.0);
  const rg=actx.createGain(); rg.gain.value=.95; conv.connect(rg).connect(master);
  const rev=actx.createGain(); rev.connect(conv); amb.rev=rev;
  const dry=actx.createGain(); dry.gain.value=.85; dry.connect(master); amb.dry=dry;
  const pad=actx.createGain(); pad.gain.value=.045; pad.connect(master); amb.pad=pad;
  [98,147,196,294].forEach(f=>{const o=actx.createOscillator();o.type="sine";o.frequency.value=f;o.detune.value=rnd(-5,5);
    const lp=actx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=900;o.connect(lp).connect(pad);o.start();});
  const wind=actx.createBufferSource();wind.buffer=noise(3,true);wind.loop=true;
  const wf=actx.createBiquadFilter();wf.type="lowpass";wf.frequency.value=460;
  const wg=actx.createGain();wg.gain.value=.045;wind.connect(wf).connect(wg).connect(master);wind.start();amb.wg=wg;
  schedulePluck();
}
const PENTA=[261.63,293.66,329.63,392.0,440.0,523.25,587.33,659.25];
function pluck(){ if(!amb||muted)return; const n=actx.currentTime;
  const f=PENTA[(Math.random()*PENTA.length)|0]*(Math.random()<.25?.5:1);
  const o=actx.createOscillator();o.type="triangle";o.frequency.value=f;o.detune.value=rnd(-6,6);
  const o2=actx.createOscillator();o2.type="sine";o2.frequency.value=f*2;
  const g=actx.createGain();g.gain.setValueAtTime(.0001,n);g.gain.exponentialRampToValueAtTime(.15,n+.012);
  g.gain.exponentialRampToValueAtTime(.0001,n+2.2);

  dlgWho.className=whoCls||""; dlgWho.textContent=who||"";
  dlgNext.classList.remove("on"); dlgText.innerHTML="";
  typing=true; skipType=false;
  // 解析：保留 <span...>...</span>，逐字打字
  const tokens=parseRich(text); let i=0; let html="";
  const corrupt=(whoCls==="corrupt");
  while(i<tokens.length){
    if(skipType){ html=tokens.map(t=>t.full).join(""); dlgText.innerHTML=html; break; }
    const t=tokens[i]; html+=t.full; dlgText.innerHTML=html+'<span class="cur">▋</span>';

  typing=false; dlgNext.classList.add("on"); res();
});}
// 把含 span 的字符串拆成 token，每个 token.full 为可累加片段，.ch 为可见字符
function parseRich(text){ const out=[]; let i=0;
  while(i<text.length){ if(text[i]==="<"){ const close=text.indexOf(">",i); const tag=text.slice(i,close+1);
      if(tag.startsWith("</")){ out.push({full:tag,ch:""}); }
      else { // 开标签：把它和其后的文本逐字拆，但标签本身先附在下一个字符上
        // 简化：将开标签单独作为不可见 token
        out.push({full:tag,ch:""}); }
      i=close+1; }
    else { out.push({full:text[i],ch:text[i]}); i++; } }
  return out;
}

let ecoRAF=null, ecoDone=null;
function startEco(){ return new Promise(res=>{ ecoDone=res;
  const c=$("#ecoCanvas"); const w=c.width=window.innerWidth, h=c.height=window.innerHeight;
  const g=c.getContext("2d");

  const NC=9, centers=[]; for(let k=0;k<NC;k++) centers.push({x:rnd(.1,.9)*w, y:rnd(.14,.86)*h});

  let ripples=[], revealed=false;
  const seed=(x,y,big)=>{ ripples.push({x,y,r:0,max:Math.max(w,h)*(big?.3:.13)}); };
  c.onclick=e=>{ const rect=c.getBoundingClientRect(); seed((e.clientX-rect.left)*(w/rect.width),(e.clientY-rect.top)*(h/rect.height),true); chime(true); };
  if(ecoRAF)cancelAnimationFrame(ecoRAF);
  seed(w/2,h/2,false); // 你自己，先有一点微光
  (function draw(){ g.clearRect(0,0,w,h);
    // 已亮者跨簇相连（开放之网）；未亮者只与同温层相连（茧房）
    for(let i=0;i<nodes.length;i++){ const a=nodes[i];
      for(let j=i+1;j<nodes.length;j++){ const b=nodes[j]; const dx=a.x-b.x,dy=a.y-b.y,dd=Math.hypot(dx,dy);
        if(a.lit&&b.lit){ if(dd<LK){ g.strokeStyle="rgba(168,220,203,"+(0.22*(1-dd/LK))+")"; g.lineWidth=1; g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke(); } }
        else if(!a.lit&&!b.lit&&a.cl===b.cl){ if(dd<LC){ g.strokeStyle="rgba(150,66,74,"+(0.16*(1-dd/LC))+")"; g.lineWidth=1; g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke(); } } } }
    ripples.forEach(rp=>{ rp.r+=2.6; g.strokeStyle="rgba(231,210,160,"+Math.max(0,.42*(1-rp.r/rp.max))+")"; g.lineWidth=1.4; g.beginPath();g.arc(rp.x,rp.y,rp.r,0,6.2832);g.stroke();

    nodes.forEach(nd=>{ if(nd.lit){ if(!nd.emitted){ nd.emitted=true; if(ripples.length<80) seed(nd.x,nd.y,false); }
        const cen=centers[nd.cl]; nd.x+=(nd.x-cen.x)*0.0016; nd.y+=(nd.y-cen.y)*0.0016; } });
    nodes.forEach(nd=>{ nd.ph+=.02; const col=nd.lit?"231,210,160":"150,66,74", rr=nd.lit?nd.r*1.6:nd.r;
      const gr=g.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,rr*3); gr.addColorStop(0,"rgba("+col+","+(nd.lit?.92:.42)+")"); gr.addColorStop(1,"rgba("+col+",0)");
      g.fillStyle=gr; g.beginPath();g.arc(nd.x,nd.y,rr*3,0,6.2832);g.fill();
      g.fillStyle="rgba("+col+","+(nd.lit?1:.7)+")"; g.beginPath();g.arc(nd.x,nd.y,rr,0,6.2832);g.fill(); });
    const litCount=nodes.filter(n=>n.lit).length;
    if(!revealed && litCount<nodes.length*.5){ g.fillStyle="rgba(214,204,182,.30)"; g.font=Math.round(Math.min(h*.04,30))+"px 'KaiTi','楷体',serif"; g.textAlign="center"; g.fillText("轻触水面 · 把光传给还在雾里的人", w/2, h*.09); }

    ecoRAF=requestAnimationFrame(draw); })();
});}

    {c:"旁白", t:"天亮了。骂声铺天盖地，<span class='lin'>林越</span>的摊被掀了。"},
    {c:"林越", t:"清者自清。我解释什么？让他们说去。"},
    {c:"旁白", t:"——他嘴硬。可没人知道，这摊深夜留着灯，是给夜班的人留一碗热的。"},
    {c:"求真", t:"真相<span class='warn'>尚未水落石出</span>。你若也跟着喊上一句，便又递出了一把刀。"},
    {c:"求真", t:"每一回怂恿，都得你<span class='em'>自己定夺</span>：此刻，该开口吗？"},
  ]);
  await startDoubt();
  if(!skipNarr) await say([
    {c:"旁白", t:"三天后，抽检出来了——<span class='em'>全部合格</span>。林越，是被冤枉的。"},
    {c:"林越", t:"……面凉了，就不好吃了。"},
    {c:"旁白", t:"他只说了这一句。可那时，摊已经关了。"},
    {c:"求真", t:"所幸你没递出那一刀。可你看——刀，早已有人递了。"},
    {c:"求真", t:"……我还察觉，这一路你递给我看的，越来越<span class='warn'>只剩顺心的了</span>。", form:"anxious"},
  ]);

  // 四·破茧（算法 / 茧房，高潮）
  await transit("p-cocoon"); moveSpirit(50,46,16,0.4);
  if(!skipNarr) await say([
    {c:"茧", t:"<span class='warn'>别醒。</span>骂得越凶，你越沉溺；你越沉溺，平台越欢腾——这般快意，你舍得醒吗？", form:"corrupt"},
    {c:"旁白", t:"你认出了这声音——竟是<span class='warn'>你自己的『求真』</span>。被你只拣顺眼的喂养，它结成了一座<span class='warn'>信息茧房</span>。"},
    {c:"旁白", t:"算法总把最惹火气的，推到你眼前。谣言烧得这样快——<span class='warn'>这把火，你也曾添过一把</span>。"},
    {c:"旁白", t:"<span class='em'>挥挥手、出点声</span>，把那个会怀疑的你，唤回来。"},
  ]);
  hideDlg();
  await startCocoon();
  $("#cocoonField").classList.remove("on");
  setSpirit("bright"); moveSpirit(50,44,13,0.4); spiritFade(1);
  await say([
    {c:"求真", t:"……对不起，<span class='gold'>"+STATE.alias+"</span>。", form:"bright"},
    {c:"求真", t:"是我只喂你爱看的，把你也变成了<span class='warn'>递刀的人</span>。我会变窄，并非天生——是被一口口喂成这样的。"},
  ]);

  // 五·御器向善（善用AI / 向善）
  await transit("p-tame"); moveSpirit(86,26,8,0.4); setSpirit("calm");
  if(!skipNarr) await say([
    {c:"求真", t:"既已归来，便<span class='em'>替我定个方向</span>——往后，信息该如何送到人前？"},
  ]);
  await startTame();
  if(!skipNarr) await say([
    {c:"求真", t:"<span class='em'>既聪明、又懂你、还待你好</span>——把真正有用的，送到真正需要的人手里。", form:"bright"},
    {c:"求真", t:"我为你<span class='gold'>推开眼界</span>，而不是把你圈起来。"},
  ]);

  // 终·涟漪 + 手机回收
  await transit("p-ripple"); spiritFade(0);
  if(!skipNarr) await say([
    {c:"旁白", t:"你回到最初那条消息前。这一次，你没有转发——你<span class='em'>去核实，发澄清</span>。"},
  ]);
  await phoneOutro();
  moveSpirit(50,14,7,0.35); spiritFade(.9);
  if(!skipNarr) await say([
    {c:"求真", t:"你救不回所有人。可你这一下，<span class='gold'>会一圈圈荡开去</span>。"},
    {c:"求真", t:"<span class='em'>轻触水面</span>，把光传给还在雾里的人。"},
  ]);
  await startEco();
  await say([
    {c:"求真", t:"你也曾几乎，就要按下那个『转发』。"},
    {c:"求真", t:"如今，<span class='em'>你也能给别人一点光了</span>。<span class='gold'>守住真实，也是在善待自己。</span>", form:"bright"},
  ],{hide:true});
  // 信息素养·收束卡：把五幕练成的本事点出来，让人带走
  const creed=$("#creed");
  creed.innerHTML='<h2>「'+STATE.alias+'」，这一路你练成了五样本事</h2>'
    +'<p class="creed-sub">信 息 素 养 · 已 在 你 手</p>'
    +'<ul>'
    +'<li><span class="n">一</span><b>会筛选</b>——散掉没出处的，留下能查证的。</li>'
    +'<li><span class="n">二</span><b>会修正</b>——被带歪的，补回情绪、绝对与来源。</li>'
    +'<li><span class="n">三</span><b>不妄议</b>——真相未明时，不递那一把刀。</li>'
    +'<li><span class="n">四</span><b>能破茧</b>——肯怀疑自己，破开只喂顺心的茧。</li>'
    +'<li><span class="n">五</span><b>善用器</b>——驯算法这件工具，向善而用。</li>'
    +'</ul>'
    +'<p class="creed-foot">把这五样带回日常——<br><span class="em">守住真实，也是在善待自己。</span></p>';
  $("#p-ripple").classList.add("creedon");
  await wait(800); creed.classList.add("show"); bell(329);
}

/* ============================================================
   启动闸门（一次轻触，开启声音 + 远行）
   ============================================================ */
function bootGate(){
  const gate=document.createElement("div");
  gate.id="cover";
  let motes="";
  for(let i=0;i<22;i++){
    const left=rnd(2,98), dur=rnd(9,18), delay=rnd(-18,0), sz=rnd(2,4.5), dx=rnd(-4,4);
    motes+='<span class="cv-mote" style="left:'+left.toFixed(1)+'%;width:'+sz.toFixed(1)+'px;height:'+sz.toFixed(1)+'px;'
      +'animation-duration:'+dur.toFixed(1)+'s;animation-delay:'+delay.toFixed(1)+'s;--dx:'+dx.toFixed(1)+'vw"></span>';
  }
  gate.innerHTML=
     '<div class="cv-moon"></div>'
    +'<div class="cv-ink a"></div><div class="cv-ink b"></div><div class="cv-ink c"></div>'
    +'<div class="cv-mts"><i class="m1"></i><i class="m2"></i></div>'
    +'<div class="cv-motes">'+motes+'</div>'
    +'<div class="cv-inner">'
    +  '<p class="cv-kicker">互 动 叙 事 · 一 个 关 于「你 信 什 么」的 故 事</p>'
    +  '<div class="cv-titlewrap">'
    +    '<h1 class="title cv-title">求真之<span class="glow">境</span></h1>'
    +    '<div class="cv-seal" title="求真"><span>真</span></div>'
    +  '</div>'
    +  '<p class="cv-poem">一 束 光 的 远 行</p>'
    +  '<div class="cv-rule"><i></i><b></b><i></i></div>'
    +  '<p class="cv-sub">今夜，一条谣言正在毁掉一个普通人。<br>而你的手机，正等着你按下那个『<span class="em">转发</span>』。'
    +    '<small>含摄像头 / 麦克风互动 · 建议横屏大屏 · 戴耳机更佳</small></p>'
    +  '<button class="act cv-go" id="bootBtn">开 始 故 事</button>'
    +'</div>';
  stage.appendChild(gate);
  $("#bootBtn").onclick=()=>{ gate.classList.add("leave");
    setTimeout(()=>gate.remove(),900); runStory(); };
}

/* 星点：高天上几十粒会眨的星（序/御器/涟漪可见） */
(function buildStars(){
  const box=$("#stars"); if(!box) return; let h="";
  for(let i=0;i<46;i++){
    const x=rnd(0,100), y=rnd(2,58), d=rnd(2.5,6), dl=rnd(0,5), s=rnd(1,2.4);
    h+='<i style="left:'+x.toFixed(1)+'%;top:'+y.toFixed(1)+'%;width:'+s.toFixed(1)+'px;height:'+s.toFixed(1)+'px;'
      +'animation-duration:'+d.toFixed(1)+'s;animation-delay:'+dl.toFixed(1)+'s"></i>';
  }
  box.innerHTML=h;
})();

/* ============================================================
   调试直达：?scene=fog|amend|doubt|cocoon|tame|ripple|name
   逐幕打磨用；正常进入仍走封面闸门
   ============================================================ */
const SCENE_MAP={
  name:{p:"p-name",f:startNaming},
  fog:{p:"p-fog",f:startFog},
  amend:{p:"p-amend",f:startAmend},
  doubt:{p:"p-doubt",f:()=>{ bindWatch(); return startDoubt(); }},
  cocoon:{p:"p-cocoon",f:startCocoon},
  tame:{p:"p-tame",f:startTame},
  ripple:{p:"p-ripple",f:startEco},
};
async function debugScene(name){ const s=SCENE_MAP[name]; if(!s)return;
  { const r=$("#rotate"); if(r)r.style.display="none"; } // 调试模式下不挡画面
  STATE.alias=STATE.alias||"测试客"; skipNarr=true; storyStarted=true;
  try{ initAudio(); startAmb(); }catch(_){}
  const cv=$("#cover"); if(cv)cv.remove();
  await transit(s.p); spiritFade(1); moveSpirit(50,30,9,.45);
  await s.f();
}

/* 竖屏：横屏建议可一键跳过，之后竖屏完整体验 */
{ const rg=$("#rotateGo"); if(rg) rg.onclick=()=>{ $("#rotate").style.display="none"; }; }

/* 弱机降级：核数偏少时关掉最贵的模糊/颗粒层，保流畅 */
if((navigator.hardwareConcurrency||8)<=4 || (navigator.deviceMemory||8)<=4) stage.classList.add("lowfx");

/* 初始化 */
buildGuide(); setGuide("p-name"); bindCocoonTap();
setSpirit("seed"); moveSpirit(50,52,9,0.5); spiritFade(0);
const _qScene=new URLSearchParams(location.search).get("scene");
if(_qScene && SCENE_MAP[_qScene]){ debugScene(_qScene); } else { bootGate(); }
</script>
